<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico · Biblia 365</title>
<style>
  body{font-family:-apple-system,Segoe UI,Arial,sans-serif;background:#F4F6F9;color:#222;padding:20px;line-height:1.5;}
  h1{font-size:20px;color:#1C3968;}
  h2{font-size:15px;color:#1C3968;margin-top:28px;border-bottom:1px solid #ddd;padding-bottom:6px;}
  .box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;font-size:13px;white-space:pre-wrap;word-break:break-all;}
  .ok{color:#1E7A3D;font-weight:bold;}
  .bad{color:#B42318;font-weight:bold;}
  button{background:#1C3968;color:#fff;border:none;border-radius:8px;padding:12px 18px;font-size:14px;margin-top:16px;width:100%;}
</style>
</head>
<body>
<h1>Diagnóstico — Biblia 365</h1>
<p>Esta página solo LEE información de tu navegador, no cambia nada. Mandá captura de lo que aparece abajo.</p>

<button onclick="runDiagnostic()">Ejecutar diagnóstico</button>

<div id="output"></div>

<script>
async function runDiagnostic(){
  var out = document.getElementById('output');
  out.innerHTML = '';

  function section(title, content, isOk){
    var cls = isOk === true ? 'ok' : (isOk === false ? 'bad' : '');
    out.innerHTML += '<h2>'+title+'</h2><div class="box"><span class="'+cls+'">'+content+'</span></div>';
  }

  // 1. localStorage
  try {
    var lastEmail = localStorage.getItem('biblia365_last_email');
    section('Mail recordado en este navegador (localStorage)',
      lastEmail ? ('Encontrado: ' + lastEmail) : 'VACÍO — no hay nada guardado',
      !!lastEmail);
  } catch(e){
    section('Mail recordado en este navegador (localStorage)', 'ERROR: ' + e.message, false);
  }

  try {
    var allKeys = Object.keys(localStorage);
    section('Todas las claves en localStorage de este sitio', allKeys.length ? allKeys.join('\n') : 'VACÍO total');
  } catch(e){
    section('Todas las claves en localStorage', 'ERROR: ' + e.message, false);
  }

  // 2. Service Worker
  if('serviceWorker' in navigator){
    var reg = await navigator.serviceWorker.getRegistration();
    if(reg){
      section('Service Worker registrado',
        'Sí. Estado: ' + (reg.active ? reg.active.state : 'sin worker activo') +
        '\nScope: ' + reg.scope +
        '\nScript URL: ' + (reg.active ? reg.active.scriptURL : 'N/A'),
        !!reg.active);
    } else {
      section('Service Worker registrado', 'NO HAY NINGÚN SERVICE WORKER REGISTRADO en este origen', false);
    }
  } else {
    section('Service Worker', 'Este navegador no soporta Service Workers', false);
  }

  // 3. Caches
  if('caches' in window){
    var cacheNames = await caches.keys();
    section('Cachés existentes', cacheNames.length ? cacheNames.join('\n') : 'NINGÚN CACHÉ EXISTE', cacheNames.length>0);

    for(var i=0;i<cacheNames.length;i++){
      var cache = await caches.open(cacheNames[i]);
      var reqs = await cache.keys();
      var urls = reqs.map(function(r){ return r.url; });
      section('Contenido del caché "'+cacheNames[i]+'"', urls.length ? urls.join('\n') : 'VACÍO');
    }
  } else {
    section('Cache API', 'No soportada en este navegador', false);
  }

  // 4. Origen actual
  section('Origen actual (debe coincidir SIEMPRE)', location.origin + location.pathname);

  // 8. Verificar el HTML real servido por el Service Worker (cache) ahora mismo
  try {
    var htmlResp = await fetch('./index.html');
    var htmlText = await htmlResp.text();
    var hasUserNameInput = htmlText.indexOf('id="userName"') !== -1;
    var hasInstallBanner = htmlText.indexOf('installBanner') !== -1;
    var scriptTag = htmlText.match(/<script[^>]*src="([^"]*app-firebase[^"]*)"/);
    section('HTML real servido ahora (index.html)',
      'Tamaño: ' + htmlText.length + ' caracteres\n' +
      'Contiene input id="userName": ' + hasUserNameInput + '\n' +
      'Contiene banner de instalación: ' + hasInstallBanner + '\n' +
      'Script app-firebase referenciado como: ' + (scriptTag ? scriptTag[1] : 'NO ENCONTRADO'),
      hasUserNameInput);
  } catch(e){
    section('HTML real servido (index.html)', 'ERROR: ' + e.message, false);
  }

  // 9. Revisar si hay MÁS de un Service Worker o alguno en estado raro
  if('serviceWorker' in navigator){
    var allRegs = await navigator.serviceWorker.getRegistrations();
    var regInfo = allRegs.map(function(r){
      return 'Scope: ' + r.scope + ' | activo: ' + (r.active?r.active.state:'NINGUNO') +
             ' | esperando: ' + (r.waiting?r.waiting.state:'ninguno') +
             ' | instalando: ' + (r.installing?r.installing.state:'ninguno');
    }).join('\n');
    section('TODOS los Service Workers registrados (cualquier scope)',
      allRegs.length ? regInfo : 'Ninguno',
      allRegs.length === 1);
  }

  // 6. Simulación exacta de lo que hace app-firebase.js al cargar
  try {
    var emailKey = localStorage.getItem('biblia365_last_email');
    var detailLog = 'Paso 1 - leer biblia365_last_email: ' + JSON.stringify(emailKey) + '\n';
    if(emailKey){
      detailLog += 'Paso 2 - el código debería poner este valor en el campo de mail y llamar loadProgressFor()\n';
      detailLog += 'Paso 3 - slug que generaría: ' + emailKey.trim().toLowerCase().replace(/[^a-z0-9@._-]+/g,'').replace(/[@.]+/g,'-').replace(/^-+|-+$/g,'') + '\n';
    } else {
      detailLog += 'PROBLEMA: no hay nada en biblia365_last_email, por eso el campo queda vacío.\n';
    }
    section('Simulación de la lógica de autocompletado', detailLog, !!emailKey);
  } catch(e){
    section('Simulación de la lógica de autocompletado', 'ERROR: ' + e.message, false);
  }

  // 7. Intentar cargar el script real de la app y ver si hay errores de sintaxis/carga
  try {
    var resp = await fetch('./app-firebase.js');
    var text = await resp.text();
    var hasGetRemembered = text.indexOf('getRememberedEmail') !== -1;
    var hasInitCall = text.indexOf('var rememberedEmail = getRememberedEmail()') !== -1;
    section('Contenido real de app-firebase.js servido ahora',
      'Tamaño: ' + text.length + ' caracteres\n' +
      'Contiene función getRememberedEmail: ' + hasGetRemembered + '\n' +
      'Contiene llamada de inicio a getRememberedEmail: ' + hasInitCall,
      hasGetRemembered && hasInitCall);
  } catch(e){
    section('Contenido real de app-firebase.js', 'ERROR al descargarlo: ' + e.message, false);
  }
}
</script>
</body>
</html>
