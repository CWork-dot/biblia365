<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico · Biblia 365</title>
<style>
  body{font-family:-apple-system,Segoe UI,Arial,sans-serif;background:#F4F6F9;color:#222;padding:20px;line-height:1.5;}
  h1{font-size:20px;color:#1C3968;}
  h2{font-size:15px;color:#1C3968;margin-top:28px;border-bottom:1px solid #ddd;padding-bottom:6px;}
  .box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;font-size:13px;white-space:pre-wrap;word-break:break-all;}
  .ok{color:#1E7A3D;font-weight:bold;}
  .bad{color:#B42318;font-weight:bold;}
  button{background:#1C3968;color:#fff;border:none;border-radius:8px;padding:12px 18px;font-size:14px;margin-top:16px;width:100%;}
</style>
</head>
<body>
<h1>Diagnóstico — Biblia 365</h1>
<p>Esta página solo LEE información de tu navegador, no cambia nada. Mandá captura de lo que aparece abajo.</p>

<button onclick="runDiagnostic()">Ejecutar diagnóstico</button>

<div id="output"></div>

<script>
window.__CAUGHT_ERRORS__ = [];
window.addEventListener('error', function(e){
  window.__CAUGHT_ERRORS__.push('ERROR: ' + e.message + ' en ' + e.filename + ':' + e.lineno);
});
window.addEventListener('unhandledrejection', function(e){
  window.__CAUGHT_ERRORS__.push('PROMESA RECHAZADA: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});
</script>
<script>
async function runDiagnostic(){
  var out = document.getElementById('output');
  out.innerHTML = '';

  function section(title, content, isOk){
    var cls = isOk === true ? 'ok' : (isOk === false ? 'bad' : '');
    out.innerHTML += '<h2>'+title+'</h2><div class="box"><span class="'+cls+'">'+content+'</span></div>';
  }

  // 1. localStorage
  try {
    var lastEmail = localStorage.getItem('biblia365_last_email');
    section('Mail recordado en este navegador (localStorage)',
      lastEmail ? ('Encontrado: ' + lastEmail) : 'VACÍO — no hay nada guardado',
      !!lastEmail);
  } catch(e){
    section('Mail recordado en este navegador (localStorage)', 'ERROR: ' + e.message, false);
  }

  try {
    var allKeys = Object.keys(localStorage);
    section('Todas las claves en localStorage de este sitio', allKeys.length ? allKeys.join('\n') : 'VACÍO total');
  } catch(e){
    section('Todas las claves en localStorage', 'ERROR: ' + e.message, false);
  }

  // 2. Service Worker
  if('serviceWorker' in navigator){
    var reg = await navigator.serviceWorker.getRegistration();
    if(reg){
      section('Service Worker registrado',
        'Sí. Estado: ' + (reg.active ? reg.active.state : 'sin worker activo') +
        '\nScope: ' + reg.scope +
        '\nScript URL: ' + (reg.active ? reg.active.scriptURL : 'N/A'),
        !!reg.active);
    } else {
      section('Service Worker registrado', 'NO HAY NINGÚN SERVICE WORKER REGISTRADO en este origen', false);
    }
  } else {
    section('Service Worker', 'Este navegador no soporta Service Workers', false);
  }

  // 3. Caches
  if('caches' in window){
    var cacheNames = await caches.keys();
    section('Cachés existentes', cacheNames.length ? cacheNames.join('\n') : 'NINGÚN CACHÉ EXISTE', cacheNames.length>0);

    for(var i=0;i<cacheNames.length;i++){
      var cache = await caches.open(cacheNames[i]);
      var reqs = await cache.keys();
      var urls = reqs.map(function(r){ return r.url; });
      section('Contenido del caché "'+cacheNames[i]+'"', urls.length ? urls.join('\n') : 'VACÍO');
    }
  } else {
    section('Cache API', 'No soportada en este navegador', false);
  }

  // 4. Origen actual
  section('Origen actual (debe coincidir SIEMPRE)', location.origin + location.pathname);

  // 7b. Verificar específicamente app-shell.js (el script nuevo que separa
  // la interfaz de la conexión a Firebase)
  try {
    var respShell = await fetch('./app-shell.js');
    var textShell = await respShell.text();
    var hasGetRememberedEmailShell = textShell.indexOf('getRememberedEmail') !== -1;
    var hasBibliaBackend = textShell.indexOf('BibliaBackend') !== -1;
    section('Contenido real de app-shell.js servido ahora (archivo NUEVO)',
      respShell.status === 200
        ? ('Tamaño: ' + textShell.length + ' caracteres\n' +
           'Contiene getRememberedEmail: ' + hasGetRememberedEmailShell + '\n' +
           'Contiene BibliaBackend: ' + hasBibliaBackend)
        : ('NO SE ENCONTRÓ EL ARCHIVO (status ' + respShell.status + ') — probablemente no se subió a GitHub o no está cacheado'),
      respShell.status === 200 && hasGetRememberedEmailShell);
  } catch(e){
    section('Contenido real de app-shell.js', 'ERROR al descargarlo: ' + e.message + ' — esto puede significar que el archivo no existe en este origen o no está cacheado para uso offline', false);
  }
  try {
    var htmlResp = await fetch('./index.html');
    var htmlText = await htmlResp.text();
    var hasUserNameInput = htmlText.indexOf('id="userName"') !== -1;
    var hasInstallBanner = htmlText.indexOf('installBanner') !== -1;
    var scriptTag = htmlText.match(/<script[^>]*src="([^"]*app-firebase[^"]*)"/);
    section('HTML real servido ahora (index.html)',
      'Tamaño: ' + htmlText.length + ' caracteres\n' +
      'Contiene input id="userName": ' + hasUserNameInput + '\n' +
      'Contiene banner de instalación: ' + hasInstallBanner + '\n' +
      'Script app-firebase referenciado como: ' + (scriptTag ? scriptTag[1] : 'NO ENCONTRADO'),
      hasUserNameInput);
  } catch(e){
    section('HTML real servido (index.html)', 'ERROR: ' + e.message, false);
  }

  // 10. Cargar el index.html REAL en un iframe oculto, para ver si tira
  // errores de JavaScript al ejecutarse (esto es lo más parecido a lo
  // que pasa cuando abrís la app de verdad)
  try {
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = './index.html';
    document.body.appendChild(iframe);
    await new Promise(function(resolve){ iframe.onload = resolve; setTimeout(resolve, 1500); });

    var iframeWin = iframe.contentWindow;

    // intentar instalar un listener de error DENTRO del iframe, aunque
    // ya haya cargado (puede no capturar errores tempranos, pero ayuda)
    var iframeErrorMsgs = [];
    try {
      iframeWin.addEventListener('error', function(e){ iframeErrorMsgs.push(e.message); });
    } catch(e){}

    await new Promise(function(resolve){ setTimeout(resolve, 1500); }); // dar tiempo a que corra el script

    var emailFieldValue = 'NO SE PUDO LEER';
    try {
      emailFieldValue = iframeWin.document.getElementById('userName').value;
    } catch(e){ emailFieldValue = 'ERROR AL LEER EL CAMPO: ' + e.message; }

    var consoleAccessible = true;
    try { iframeWin.console.log('test'); } catch(e){ consoleAccessible = false; }

    var persistenceStatus = 'NO DISPONIBLE (puede no haber alcanzado a cargar Firebase a tiempo)';
    try {
      if(iframeWin.__FIRESTORE_PERSISTENCE_STATUS__ !== undefined){
        persistenceStatus = iframeWin.__FIRESTORE_PERSISTENCE_STATUS__;
      }
    } catch(e){ persistenceStatus = 'ERROR AL LEER: ' + e.message; }

    section('Estado de la persistencia offline de Firestore (clave para entender el progreso offline)',
      'Estado: ' + persistenceStatus,
      persistenceStatus === 'habilitada');

    section('Prueba real: cargar index.html en un iframe y ver qué pasa',
      'Valor del campo mail DENTRO del iframe tras cargar: ' + JSON.stringify(emailFieldValue) + '\n' +
      'Errores capturados dentro del iframe: ' + (iframeErrorMsgs.length ? iframeErrorMsgs.join(' | ') : 'ninguno (puede no haber alcanzado a instalarse a tiempo)'),
      typeof emailFieldValue === 'string' && emailFieldValue.indexOf('@') !== -1);

    document.body.removeChild(iframe);
  } catch(e){
    section('Prueba real: cargar index.html en un iframe', 'ERROR: ' + e.message, false);
  }

  // 12. Cargar index.html en un iframe VISIBLE temporalmente y revisar
  // el estado exacto del DOM tras un tiempo de espera, para ver
  // exactamente qué se renderizó y qué no.
  try {
    var iframe2 = document.createElement('iframe');
    iframe2.style.width = '1px';
    iframe2.style.height = '1px';
    iframe2.style.position = 'absolute';
    iframe2.style.left = '-9999px';
    iframe2.src = './index.html';
    document.body.appendChild(iframe2);
    await new Promise(function(resolve){ iframe2.onload = resolve; setTimeout(resolve, 1200); });
    await new Promise(function(resolve){ setTimeout(resolve, 1500); });

    var iw = iframe2.contentWindow;
    var idoc = iw.document;

    function safeText(id){
      try { var el = idoc.getElementById(id); return el ? JSON.stringify(el.textContent) : 'ELEMENTO NO EXISTE'; }
      catch(e){ return 'ERROR: ' + e.message; }
    }
    function safeHTML(id){
      try { var el = idoc.getElementById(id); return el ? (el.innerHTML.length + ' caracteres de HTML, primeros 200: ' + JSON.stringify(el.innerHTML.slice(0,200))) : 'ELEMENTO NO EXISTE'; }
      catch(e){ return 'ERROR: ' + e.message; }
    }

    var report = '';
    report += 'dayEyebrow: ' + safeText('dayEyebrow') + '\n';
    report += 'dayPeriod: ' + safeText('dayPeriod') + '\n';
    report += 'dayReadings (HTML interno): ' + safeHTML('dayReadings') + '\n';
    report += 'statDone: ' + safeText('statDone') + '\n';
    report += 'connStatus clase: ' + (function(){ try { return idoc.getElementById('connStatus').className; } catch(e){ return 'ERROR'; } })() + '\n';
    report += 'navigator.onLine dentro del iframe: ' + iw.navigator.onLine + '\n';

    // Revisar si hay datos del plan cargados
    try {
      var planDataEl = idoc.getElementById('plan-data');
      report += 'plan-data existe: ' + !!planDataEl + ', tamaño: ' + (planDataEl ? planDataEl.textContent.length : 0) + '\n';
    } catch(e){ report += 'Error leyendo plan-data: ' + e.message + '\n'; }

    section('Estado real del DOM dentro de index.html (tras 1.5s de carga)', report,
      idoc.getElementById('dayReadings') && idoc.getElementById('dayReadings').innerHTML.length > 50);

    document.body.removeChild(iframe2);
  } catch(e){
    section('Estado real del DOM dentro de index.html', 'ERROR GENERAL: ' + e.message + '\n' + e.stack, false);
  }

  // 14. Verificar específicamente la base de datos IndexedDB que usa
  // Firestore para su caché offline — esto nos dice si alguna vez
  // se guardó algo ahí con éxito.
  try {
    if('indexedDB' in window && indexedDB.databases){
      var dbs = await indexedDB.databases();
      var dbInfo = dbs.map(function(d){ return d.name + ' (v' + d.version + ')'; }).join('\n');
      section('Bases de datos IndexedDB en este navegador',
        dbs.length ? dbInfo : 'NINGUNA — esto puede significar que Firestore nunca llegó a guardar nada localmente',
        dbs.length > 0);

      // Buscar específicamente la de firestore y ver si tiene datos
      var firestoreDbName = dbs.find(function(d){ return d.name && d.name.indexOf('firestore') !== -1; });
      if(firestoreDbName){
        try {
          var openReq = indexedDB.open(firestoreDbName.name);
          var idb = await new Promise(function(resolve, reject){
            openReq.onsuccess = function(){ resolve(openReq.result); };
            openReq.onerror = function(){ reject(openReq.error); };
          });
          var storeNames = Array.from(idb.objectStoreNames);
          section('Contenido de la base IndexedDB de Firestore: ' + firestoreDbName.name,
            'Object stores encontrados: ' + storeNames.join(', '),
            storeNames.length > 0);
          idb.close();
        } catch(e){
          section('Contenido de la base IndexedDB de Firestore', 'ERROR al abrirla: ' + e.message, false);
        }
      }
    } else {
      section('Bases de datos IndexedDB', 'indexedDB.databases() no soportado en este navegador', false);
    }
  } catch(e){
    section('Bases de datos IndexedDB', 'ERROR: ' + e.message, false);
  }

  // 15. Errores capturados globalmente durante todo el diagnóstico
  section('Errores de JavaScript detectados en esta página',
    window.__CAUGHT_ERRORS__.length ? window.__CAUGHT_ERRORS__.join('\n') : 'Ninguno',
    window.__CAUGHT_ERRORS__.length === 0);

  // 6. Simulación exacta de lo que hace app-firebase.js al cargar
  try {
    var emailKey = localStorage.getItem('biblia365_last_email');
    var detailLog = 'Paso 1 - leer biblia365_last_email: ' + JSON.stringify(emailKey) + '\n';
    if(emailKey){
      detailLog += 'Paso 2 - el código debería poner este valor en el campo de mail y llamar loadProgressFor()\n';
      detailLog += 'Paso 3 - slug que generaría: ' + emailKey.trim().toLowerCase().replace(/[^a-z0-9@._-]+/g,'').replace(/[@.]+/g,'-').replace(/^-+|-+$/g,'') + '\n';
    } else {
      detailLog += 'PROBLEMA: no hay nada en biblia365_last_email, por eso el campo queda vacío.\n';
    }
    section('Simulación de la lógica de autocompletado', detailLog, !!emailKey);
  } catch(e){
    section('Simulación de la lógica de autocompletado', 'ERROR: ' + e.message, false);
  }

  // 7. Intentar cargar el script real de la app y ver si hay errores de sintaxis/carga
  try {
    var resp = await fetch('./app-firebase.js');
    var text = await resp.text();
    var hasGetRemembered = text.indexOf('getRememberedEmail') !== -1;
    var hasInitCall = text.indexOf('var rememberedEmail = getRememberedEmail()') !== -1;
    section('Contenido real de app-firebase.js servido ahora',
      'Tamaño: ' + text.length + ' caracteres\n' +
      'Contiene función getRememberedEmail: ' + hasGetRemembered + '\n' +
      'Contiene llamada de inicio a getRememberedEmail: ' + hasInitCall,
      hasGetRemembered && hasInitCall);
  } catch(e){
    section('Contenido real de app-firebase.js', 'ERROR al descargarlo: ' + e.message, false);
  }
}
</script>
</body>
</html>
